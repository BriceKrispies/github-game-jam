<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<script>
function generateIcon(size, maskable) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const padding = maskable ? size * 0.1 : 0;
  const innerSize = size - padding * 2;

  // Background
  ctx.fillStyle = '#4361ee';
  if (maskable) {
    ctx.fillRect(0, 0, size, size);
  } else {
    const r = size * 0.15;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill();
  }

  // GS text
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${innerSize * 0.42}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GS', size / 2, size / 2 + innerSize * 0.02);

  return canvas.toDataURL('image/png');
}

// Generate and download
[[192, false, 'icon-192.png'], [512, false, 'icon-512.png'], [512, true, 'icon-512-maskable.png']].forEach(([size, maskable, name]) => {
  const a = document.createElement('a');
  a.href = generateIcon(size, maskable);
  a.download = name;
  a.textContent = name;
  a.style.display = 'block';
  a.style.margin = '10px';
  document.body.appendChild(a);
});

document.body.insertAdjacentHTML('afterbegin', '<p>Click each link to download, then place in public/icons/</p>');
</script>
</body>
</html>
